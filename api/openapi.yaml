openapi: 3.0.3
info:
  title: VibeShelf API
  version: 1.0.0
  description: Local backend API for VibeShelf Prototype 2. The frontend calls this API, and this API connects to Supabase.

servers:
  - url: http://localhost:3001

paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: API is running

  /api/books:
    get:
      summary: Get all books
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
          example: habits
        - name: genre
          in: query
          required: false
          schema:
            type: string
          example: Fiction
        - name: author
          in: query
          required: false
          schema:
            type: string
          example: Matt Haig
        - name: minRating
          in: query
          required: false
          schema:
            type: number
          example: 4
      responses:
        "200":
          description: List of books
        "500":
          description: Server error

    post:
      summary: Create a new book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - author
              properties:
                title:
                  type: string
                author:
                  type: string
                genre:
                  type: string
                isbn:
                  type: string
                description:
                  type: string
                cover_image_url:
                  type: string
                average_rating:
                  type: number
            example:
              title: Smoke Test Book
              author: Smoke Test Author
              genre: Fiction
              isbn: "9999999999998"
              description: Created through the API.
              cover_image_url: https://example.com/test-cover.jpg
      responses:
        "201":
          description: Book created
        "400":
          description: Missing required fields
        "500":
          description: Server error

  /api/books/{id}:
    get:
      summary: Get one book by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Book found
        "404":
          description: Book not found
        "500":
          description: Server error

  /api/books/user/{userId}:
    get:
      summary: Get one user's bookshelf entries
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            type: string
          example: currently_reading
      responses:
        "200":
          description: User bookshelf entries returned
        "400":
          description: Missing user ID
        "500":
          description: Server error

  /api/books/user:
    post:
      summary: Add a book to a user's bookshelf
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_id
                - book_id
              properties:
                user_id:
                  type: string
                  format: uuid
                book_id:
                  type: string
                  format: uuid
                status:
                  type: string
                  enum:
                    - want_to_read
                    - currently_reading
                    - finished
                    - paused
                    - dropped
                    - re_reading
                progress:
                  type: integer
                start_date:
                  type: string
                  format: date
                finish_date:
                  type: string
                  format: date
      responses:
        "201":
          description: Book added to bookshelf
        "400":
          description: Missing required fields
        "500":
          description: Server error

  /api/moods:
    get:
      summary: Get all moods
      responses:
        "200":
          description: List of moods
        "500":
          description: Server error
